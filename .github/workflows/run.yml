name: Run Proxy

on:
  workflow_dispatch:
  push:

jobs:
  run:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: |
          pip install -r requirements.txt

      - name: Run proxy
        run: |
          python app.py
